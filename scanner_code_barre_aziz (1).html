<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Scanner Code Barre - Développé par Aziz</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }
        #reader {
            width: 300px;
            margin: auto;
        }
        .card {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            display: inline-block;
        }
        img {
            width: 150px;
        }
        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>

<h2>📷 Scanner un code-barres</h2>
<p><strong>Cette application a été développée par Aziz</strong></p>

<div id="reader"></div>

<div class="card" id="product" style="display:none;">
    <h3 id="name"></h3>
    <p id="brand"></p>
    <img id="image" />
</div>

<div class="footer">
    © Aziz - Application de scan
</div>

<script>
function onScanSuccess(code) {
    console.log("Code détecté:", code);

    scanner.clear();

    fetch("https://world.openfoodfacts.org/api/v0/product/" + code + ".json")
        .then(res => res.json())
        .then(data => {
            if (data.status === 1) {
                const product = data.product;

                document.getElementById("product").style.display = "block";
                document.getElementById("name").innerText = product.product_name || "Nom inconnu";
                document.getElementById("brand").innerText = "Marque: " + (product.brands || "Non disponible");
                document.getElementById("image").src = product.image_front_url || "";

            } else {
                alert("❌ Produit non trouvé");
            }
        })
        .catch(() => alert("Erreur API"));
}

let scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
});

scanner.render(onScanSuccess);
</script>

</body>
</html>
