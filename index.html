<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scanner UDI Simple - Aziz</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f6f9;
}
#reader {
    width: 320px;
    margin: auto;
}
.card {
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
}
button {
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #2c3e50;
    color: white;
}
.item {
    background: #eee;
    margin: 5px;
    padding: 5px;
}
</style>
</head>

<body>

<h2>📷 Scanner UDI</h2>
<p><strong>Application développée par Aziz</strong></p>

<div id="reader"></div>

<button onclick="startScan()">▶️ Scanner</button>
<button onclick="validateScan()">✅ Valider</button>

<div class="card" id="result" style="display:none;">
    <p id="udi"></p>
    <h3 id="ref"></h3>
    <p id="lot"></p>
</div>

<div class="card">
    <h3>📊 Historique</h3>
    <div id="history"></div>
</div>

<script>

// ✅ TA BASE EXACTE (comme Excel)
const database = [
    {ref:"CP1490/XL", lot:"1912S0015", udi:"1117101912S0015"},
    {ref:"CP1690/XL", lot:"1912S0016", udi:"1117101912S0016"},
    {ref:"CP1870/XL", lot:"1912R0025", udi:"1117101912R0025"},
    {ref:"CP2240/XL", lot:"1912R0026", udi:"1117101912R0026"},
    {ref:"CP2240/XL", lot:"1912S0017", udi:"1117101912S0017"}
];

let lastScan = null;
let scannerActive = false;

// ✅ NETTOYAGE
function clean(value) {
    return value.toString().trim();
}

// ✅ START SCAN
function startScan() {
    scannerActive = true;
}

// ✅ SCAN
function onScanSuccess(code) {

    if (!scannerActive) return;

    scannerActive = false;

    let udi = clean(code);
    lastScan = udi;

    document.getElementById("result").style.display = "block";
    document.getElementById("udi").innerText = "UDI: " + udi;
    document.getElementById("ref").innerText = "En attente validation...";
    document.getElementById("lot").innerText = "";
}

// ✅ VALIDATION
function validateScan() {

    if (!lastScan) return;

    let udi = clean(lastScan);

    let product = database.find(p => clean(p.udi) === udi);

    let text;

    if (product) {
        document.getElementById("ref").innerText = "✅ Référence: " + product.ref;
        document.getElementById("lot").innerText = "LOT: " + product.lot;
        text = product.ref + " | " + product.lot;
    } else {
        document.getElementById("ref").innerText = "❌ Produit non trouvé";
        document.getElementById("lot").innerText = "";
        text = "Inconnu | " + udi;
    }

    addHistory(text);
}

// ✅ HISTORIQUE
function addHistory(text) {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = text;
    document.getElementById("history").prepend(div);
}

// ✅ SCANNER
let scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
});

scanner.render(onScanSuccess);

</script>

</body>
</html>
