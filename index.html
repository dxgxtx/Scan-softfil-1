<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scanner UDI Officiel - Aziz</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f6f9;
}
#reader {
    width: 300px;
    margin: auto;
}
.card {
    background: white;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
}
button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #2c3e50;
    color: white;
}
.item {
    background: #eee;
    margin: 5px;
    padding: 5px;
}
</style>
</head>

<body>

<h2>📷 Scanner UDI</h2>
<p><strong>Application développée par Aziz</strong></p>

<div id="reader"></div>

<button onclick="startScan()">▶️ Scanner</button>
<button onclick="validateScan()">✅ Valider</button>

<div class="card" id="result" style="display:none;">
    <p id="udi"></p>
    <h3 id="ref"></h3>
    <p id="lot"></p>
</div>

<div class="card">
    <h3>📊 Historique</h3>
    <div id="history"></div>
</div>

<script>

// ✅ BASE CSV
let database = [];

// ✅ Charger automatiquement data.csv
fetch("data.csv")
.then(res => res.text())
.then(text => {

    let lines = text.split("\n");

    database = lines.slice(1).map(line => {
        let cols = line.split(",");

        return {
            ref: cols[0]?.trim(),
            lot: cols[1]?.trim(),
            udi: cols[2]?.trim()
        };
    });

    console.log("✅ Base chargée", database);
});

// ✅ Variables
let lastScan = null;
let scannerActive = false;

// ✅ Nettoyage robuste
function normalize(value) {
    return value.replace(/[^A-Z0-9]/gi, "").trim();
}

// ✅ Lancer scan
function startScan() {
    scannerActive = true;
}

// ✅ Scan
function onScanSuccess(code) {

    if (!scannerActive) return;

    scannerActive = false;

    let udi = code.trim();
    lastScan = udi;

    document.getElementById("result").style.display = "block";
    document.getElementById("udi").innerText = "UDI: " + udi;
    document.getElementById("ref").innerText = "En attente validation...";
    document.getElementById("lot").innerText = "";
}

// ✅ Validation (match sur UDI)
function validateScan() {

    if (!lastScan) return;

    let udiScan = normalize(lastScan);

    let product = database.find(p => normalize(p.udi || "") === udiScan);

    if (product) {
        document.getElementById("ref").innerText = "✅ Référence: " + product.ref;
        document.getElementById("lot").innerText = "LOT: " + product.lot;

        addHistory(product.ref + " | " + product.lot);
    } else {
        document.getElementById("ref").innerText = "❌ Produit non trouvé";
        document.getElementById("lot").innerText = "";

        addHistory("Inconnu | " + udiScan);
    }
}

// ✅ Historique
function addHistory(text) {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = text;

    document.getElementById("history").prepend(div);
}

// ✅ Scanner
let scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
});

scanner.render(onScanSuccess);

</script>

</body>
</html>
