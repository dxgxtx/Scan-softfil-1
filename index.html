<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>UDI Industriel Auto - Aziz</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f6f9;
}
#reader {
    width: 320px;
    margin: auto;
}
.card {
    background: white;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
}
.history {
    margin-top: 20px;
    max-height: 200px;
    overflow-y: auto;
}
.item {
    background: #eee;
    padding: 5px;
    margin: 5px;
    border-radius: 5px;
}
</style>
</head>

<body>

<h2>📷 Scanner UDI Industriel</h2>
<p><strong>Application développée par Aziz</strong></p>

<div id="reader"></div>

<div class="card" id="result" style="display:none;">
    <p id="gtin"></p>
    <p id="lot"></p>
    <p id="exp"></p>
    <p id="serial"></p>
    <h3 id="ref"></h3>
</div>

<div class="card">
    <h3>📊 Historique des scans</h3>
    <div class="history" id="history"></div>
</div>

<script>

// ✅ CHARGEMENT AUTO DE TON EXCEL (CSV)
let database = [];

fetch("data.csv")
.then(res => res.text())
.then(text => {
    let lines = text.split("\\n");

    database = lines.slice(1).map(line => {
        let cols = line.split(",");
        return {
            ref: cols[0],
            lot: cols[1],
            udi: cols[2]
        };
    });

    console.log("✅ Base chargée automatiquement");
});

// ✅ PARSER GS1
function parseGS1(data) {

    let result = {};

    let gtin = data.match(/01(\\d{14})/);
    let lot  = data.match(/10([A-Z0-9]+)/);
    let exp  = data.match(/17(\\d{6})/);
    let ser  = data.match(/21([A-Z0-9]+)/);

    if (gtin) result.gtin = gtin[1];
    if (lot) result.lot = lot[1];

    if (exp) {
        let d = exp[1];
        result.exp = "20" + d.substring(0,2) + "-" + d.substring(2,4) + "-" + d.substring(4,6);
    }

    if (ser) result.serial = ser[1];

    return result;
}

// ✅ AJOUT HISTORIQUE
function addToHistory(text) {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = text;

    document.getElementById("history").prepend(div);
}

// ✅ SCAN
function onScanSuccess(code) {

    let parsed = parseGS1(code);

    let product = database.find(p => p.lot === parsed.lot);

    document.getElementById("result").style.display = "block";

    document.getElementById("gtin").innerText = "GTIN: " + (parsed.gtin || "-");
    document.getElementById("lot").innerText = "LOT: " + (parsed.lot || "-");
    document.getElementById("exp").innerText = "Expiration: " + (parsed.exp || "-");
    document.getElementById("serial").innerText = "Serial: " + (parsed.serial || "-");

    let text;

    if (product) {
        document.getElementById("ref").innerText = "Référence: " + product.ref;
        text = product.ref + " | LOT: " + parsed.lot;
    } else {
        document.getElementById("ref").innerText = "Produit non trouvé";
        text = "Inconnu | LOT: " + parsed.lot;
    }

    addToHistory(text);
}

// ✅ SCANNER
let scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250,
    formatsToSupport: [
        Html5QrcodeSupportedFormats.DATA_MATRIX,
        Html5QrcodeSupportedFormats.QR_CODE
    ]
});

scanner.render(onScanSuccess);

</script>

</body>
</html>
