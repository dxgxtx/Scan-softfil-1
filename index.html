<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scanner UDI Industriel - Aziz</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; text-align: center; background:#f4f6f9; }
#reader { width:320px; margin:auto; }
.card { background:white; padding:20px; margin-top:20px; border-radius:10px; }
button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#2c3e50;
    color:white;
}
.item { background:#eee; margin:5px; padding:5px; }
</style>
</head>

<body>

<h2>📷 Scanner UDI Fiable</h2>
<p><b>Application développée par Aziz</b></p>

<div id="reader"></div>

<button onclick="startScan()">▶️ Scanner</button>
<button onclick="validateScan()">✅ Valider</button>

<div class="card" id="result" style="display:none;">
<p id="udi"></p>
<p id="lot"></p>
<h3 id="ref"></h3>
</div>

<div class="card">
<h3>📊 Historique</h3>
<div id="history"></div>
</div>

<script>

// ✅ BASE (NETTOYÉE)
const database = [
    {ref:"CP1490/XL", lot:"1912S0015"},
    {ref:"CP1690/XL", lot:"1912S0016"},
    {ref:"CP1870/XL", lot:"1912R0025"},
    {ref:"CP2240/XL", lot:"1912R0026"},
    {ref:"CP2240/XL", lot:"1912S0017"}
];

// ✅ VARIABLES
let lastScan = null;
let scannerActive = false;

// ✅ NETTOYAGE TEXTE (TRÈS IMPORTANT)
function clean(value) {
    return value.toString().trim().replace(/\r/g, "");
}

// ✅ EXTRACTION LOT
function extractLot(code) {

    if (!code) return null;

    // GS1
    let match = code.match(/10([A-Z0-9]+)/);
    if (match) return clean(match[1]);

    // fallback
    return clean(code.slice(-9));
}

// ✅ START SCAN
function startScan() {
    scannerActive = true;
    document.getElementById("result").style.display = "none";
}

// ✅ SCAN
function onScanSuccess(code) {

    if (!scannerActive) return;

    scannerActive = false; // stop scan auto

    let lot = extractLot(code);
    lastScan = { code, lot };

    document.getElementById("result").style.display = "block";
    document.getElementById("udi").innerText = "UDI: " + code;
    document.getElementById("lot").innerText = "LOT: " + (lot || "-");
    document.getElementById("ref").innerText = "Scan en attente de validation...";
}

// ✅ VALIDATION
function validateScan() {

    if (!lastScan) return;

    let lot = clean(lastScan.lot);

    let product = database.find(p => clean(p.lot) === lot);

    let text;

    if (product) {
        document.getElementById("ref").innerText = "Référence: " + product.ref;
        text = product.ref + " | LOT: " + lot;
    } else {
        document.getElementById("ref").innerText = "❌ Produit non trouvé";
        text = "Inconnu | LOT: " + lot;
    }

    addHistory(text);
}

// ✅ HISTORIQUE
function addHistory(text) {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = text;
    document.getElementById("history").prepend(div);
}

// ✅ SCANNER INIT
let scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250,
    formatsToSupport: [
        Html5QrcodeSupportedFormats.DATA_MATRIX
    ]
});

scanner.render(onScanSuccess);

</script>

</body>
</html>
