<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scanner UDI SoftFil</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f4f6f9;
}
#reader {
    width: 320px;
    margin: auto;
}
.card {
    background: white;
    max-width: 600px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 12px;
}
button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #2c3e50;
    color: white;
    cursor: pointer;
}
.item {
    background: #eee;
    margin: 5px;
    padding: 8px;
    border-radius: 6px;
}
.result-line {
    margin: 10px;
    font-size: 18px;
}
</style>
</head>

<body>

<h2>📷 Scanner UDI SoftFil</h2>
<p><strong>Application développée par Aziz</strong></p>

<div id="reader"></div>

<button onclick="startScan()">▶️ Scanner</button>
<button onclick="validateScan()">✅ Valider</button>

<div class="card" id="result" style="display:none;">
    <div class="result-line" id="ref"></div>
    <div class="result-line" id="lot"></div>
    <div class="result-line" id="gtin"></div>
    <div class="result-line" id="udi"></div>
</div>

<div class="card">
    <h3>📊 Historique</h3>
    <div id="history"></div>
</div>

<script>
let database = [];
let lastScan = null;
let scannerActive = false;

function normalize(value) {
    return String(value || "")
        .replace(/[^A-Za-z0-9]/g, "")
        .toUpperCase()
        .trim();
}

// Extraction du GTIN = 14 chiffres après le AI 01
function extractGTIN(udi) {
    const clean = normalize(udi);
    const match = clean.match(/01(\d{14})/);
    return match ? match[1] : "Non trouvé";
}

// CSV simple : ref,lot,udi
function parseCSVLine(line) {
    return line.split(",").map(col =>
        col.trim().replace(/^"|"$/g, "")
    );
}

fetch("data.csv")
.then(response => response.text())
.then(text => {
    const lines = text.trim().split(/\r?\n/);

    database = lines.slice(1).map(line => {
        const cols = parseCSVLine(line);

        return {
            ref: cols[0] || "",
            lot: cols[1] || "",
            udi: cols[2] || "",
            gtin: extractGTIN(cols[2] || "")
        };
    });

    console.log("Base chargée :", database);
})
.catch(error => {
    console.error(error);
    alert("Erreur : impossible de charger data.csv");
});

function startScan() {
    scannerActive = true;
    lastScan = null;

    document.getElementById("result").style.display = "block";
    document.getElementById("ref").innerHTML = "";
    document.getElementById("lot").innerHTML = "";
    document.getElementById("gtin").innerHTML = "";
    document.getElementById("udi").innerHTML = "Scanner prêt...";
}

function onScanSuccess(decodedText) {
    if (!scannerActive) return;

    scannerActive = false;
    lastScan = decodedText;

    document.getElementById("result").style.display = "block";
    document.getElementById("udi").innerHTML =
        "<strong>Code scanné :</strong><br>" + decodedText;

    document.getElementById("ref").innerHTML = "En attente de validation...";
    document.getElementById("lot").innerHTML = "";
    document.getElementById("gtin").innerHTML = "";
}

function validateScan() {
    if (!lastScan) {
        alert("Veuillez scanner un UDI.");
        return;
    }

    const scan = normalize(lastScan);

    const product = database.find(p => {
        const dbUdi = normalize(p.udi);
        return dbUdi === scan || scan.includes(dbUdi) || dbUdi.includes(scan);
    });

    if (product) {
        document.getElementById("ref").innerHTML =
            "<strong>Référence :</strong> " + product.ref;

        document.getElementById("lot").innerHTML =
            "<strong>LOT :</strong> " + product.lot;

        document.getElementById("gtin").innerHTML =
            "<strong>GTIN :</strong> " + product.gtin;

        document.getElementById("udi").innerHTML =
            "<strong>UDI :</strong> " + product.udi;

        addHistory(product.ref + " | LOT " + product.lot + " | GTIN " + product.gtin);
    } else {
        document.getElementById("ref").innerHTML = "❌ Produit non trouvé";
        document.getElementById("lot").innerHTML = "";
        document.getElementById("gtin").innerHTML =
            "<strong>GTIN scanné :</strong> " + extractGTIN(lastScan);

        addHistory("Inconnu | " + lastScan);
    }
}

function addHistory(text) {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = text;
    document.getElementById("history").prepend(div);
}

const scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
});

scanner.render(onScanSuccess);
</script>

</body>
</html>
