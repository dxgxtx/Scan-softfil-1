<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scanner UDI Industriel Corrigé - Aziz</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; text-align: center; background:#f4f6f9; }
#reader { width:320px; margin:auto; }
.card { background:white; padding:20px; margin-top:20px; border-radius:10px; }
button { padding:10px; margin:5px; border-radius:8px; border:none; background:#2c3e50; color:white; }
.item { background:#eee; margin:5px; padding:5px; }
</style>
</head>

<body>

<h2>📷 Scanner UDI Industriel</h2>
<p><b>Application développée par Aziz</b></p>

<div id="reader"></div>

<button onclick="startScan()">▶️ Scanner</button>
<button onclick="validateScan()">✅ Valider</button>

<div class="card" id="result" style="display:none;">
<p id="udi"></p>
<p id="gtin"></p>
<p id="lot"></p>
<h3 id="ref"></h3>
</div>

<div class="card">
<h3>📊 Historique</h3>
<div id="history"></div>
</div>

<script>

// ✅ BASE (AJOUT GTIN IMPORTANT)
const database = [
    {ref:"CP1490/XL", lot:"1912S0015", gtin:"07612345678903"},
    {ref:"CP1690/XL", lot:"1912S0016", gtin:"07612345678904"},
    {ref:"CP1870/XL", lot:"1912R0025", gtin:"07612345678905"},
    {ref:"CP2240/XL", lot:"1912R0026", gtin:"07612345678906"},
    {ref:"CP2240/XL", lot:"1912S0017", gtin:"07612345678907"}
];

let lastScan = null;
let scannerActive = false;


// ✅ PARSER GS1 CORRECT
function parseGS1(code) {

    let result = {};

    let gtin = code.match(/01(\\d{14})/);
    let lot  = code.match(/10([A-Z0-9]+)/);

    if (gtin) result.gtin = gtin[1];
    if (lot) result.lot = lot[1];

    // fallback si pas GS1
    if (!result.lot && code.length > 9) {
        result.lot = code.slice(-9);
    }

    return result;
}


// ✅ START
function startScan() {
    scannerActive = true;
}


// ✅ SCAN
function onScanSuccess(code) {

    if (!scannerActive) return;

    scannerActive = false;

    let parsed = parseGS1(code);
    lastScan = parsed;

    document.getElementById("result").style.display = "block";
    document.getElementById("udi").innerText = "UDI: " + code;
    document.getElementById("gtin").innerText = "GTIN: " + (parsed.gtin || "-");
    document.getElementById("lot").innerText = "LOT: " + (parsed.lot || "-");
    document.getElementById("ref").innerText = "Scan en attente...";
}


// ✅ VALIDATION (LOGIQUE INDUSTRIELLE)
function validateScan() {

    if (!lastScan) return;

    let product = null;

    // ✅ PRIORITÉ 1 → LOT
    if (lastScan.lot) {
        product = database.find(p => p.lot === lastScan.lot);
    }

    // ✅ PRIORITÉ 2 → GTIN
    if (!product && lastScan.gtin) {
        product = database.find(p => p.gtin === lastScan.gtin);
    }

    let text;

    if (product) {
        document.getElementById("ref").innerText = "Référence: " + product.ref;
        text = product.ref + " | LOT: " + (lastScan.lot || "-");
    } else {
        document.getElementById("ref").innerText = "❌ Produit non trouvé";
        text = "Inconnu";
    }

    addHistory(text);
}


// ✅ HISTORIQUE
function addHistory(text) {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = text;
    document.getElementById("history").prepend(div);
}


// ✅ SCANNER
let scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250,
    formatsToSupport: [
        Html5QrcodeSupportedFormats.DATA_MATRIX
    ]
});

scanner.render(onScanSuccess);

</script>

</body>
</html>
``
