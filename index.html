<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scanner UDI Fiable - Aziz</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f6f9;
}
#reader {
    width: 320px;
    margin: auto;
}
.card {
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
}
.item {
    background:#eee;
    margin:5px;
    padding:5px;
}
</style>
</head>

<body>

<h2>📷 Scanner UDI Fiable (9 derniers caractères)</h2>
<p><strong>Application développée par Aziz</strong></p>

<div id="reader"></div>

<div class="card" id="result" style="display:none;">
    <p id="udi"></p>
    <p id="lot"></p>
    <h3 id="ref"></h3>
</div>

<div class="card">
<h3>📊 Historique</h3>
<div id="history"></div>
</div>

<script>

// ✅ BASE (issue Excel)
const database = [
    {ref:"CP1490/XL", lot:"1912S0015"},
    {ref:"CP1690/XL", lot:"1912S0016"},
    {ref:"CP1870/XL", lot:"1912R0025"},
    {ref:"CP2240/XL", lot:"1912R0026"},
    {ref:"CP2240/XL", lot:"1912S0017"}
];

// ✅ EXTRACTION LOT = 9 DERNIERS CARACTÈRES
function extractLot(code) {
    if (!code || code.length < 9) return null;
    return code.slice(-9);
}

// ✅ HISTORIQUE
function addHistory(text) {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = text;
    document.getElementById("history").prepend(div);
}

// ✅ SCAN
function onScanSuccess(code) {

    let lot = extractLot(code);

    let product = database.find(p => p.lot === lot);

    document.getElementById("result").style.display = "block";
    document.getElementById("udi").innerText = "UDI: " + code;
    document.getElementById("lot").innerText = "LOT extrait: " + (lot || "-");

    let text;

    if (product) {
        document.getElementById("ref").innerText = "Référence: " + product.ref;
        text = product.ref + " | " + lot;
    } else {
        document.getElementById("ref").innerText = "Produit non trouvé";
        text = "Inconnu | " + lot;
    }

    addHistory(text);
}

// ✅ SCANNER
let scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250,
    formatsToSupport: [
        Html5QrcodeSupportedFormats.DATA_MATRIX,
        Html5QrcodeSupportedFormats.QR_CODE
    ]
});

scanner.render(onScanSuccess);

</script>

</body>
</html>
