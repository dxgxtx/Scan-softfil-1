<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scanner UDI SoftFil</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:Arial;text-align:center;background:#f4f6f9}
#reader{width:320px;margin:auto}
.card{background:white;max-width:650px;margin:20px auto;padding:20px;border-radius:12px}
button{padding:10px 20px;margin:5px;border:none;border-radius:8px;background:#2c3e50;color:white}
.line{font-size:18px;margin:10px}
.item{background:#eee;margin:5px;padding:8px;border-radius:6px}
</style>
</head>

<body>

<h2>📷 Scanner UDI SoftFil</h2>

<div id="reader"></div>

<div class="card" id="result">
    <div class="line" id="status">Chargement de la base...</div>
    <div class="line" id="ref"></div>
    <div class="line" id="lot"></div>
    <div class="line" id="gtin"></div>
    <div class="line" id="udi"></div>
</div>

<div class="card">
    <h3>📊 Historique</h3>
    <div id="history"></div>
</div>

<script>
let database = [];

function clean(value){
    return String(value || "")
        .replace(/\u001d/g, "")
        .replace(/[^A-Za-z0-9/]/g, "")
        .toUpperCase()
        .trim();
}

function cleanOnlyAlphaNum(value){
    return String(value || "")
        .replace(/\u001d/g, "")
        .replace(/[^A-Za-z0-9]/g, "")
        .toUpperCase()
        .trim();
}

// GTIN = 14 chiffres après 01
function extractGTIN(udi){
    const value = cleanOnlyAlphaNum(udi);
    const match = value.match(/01(\d{14})/);
    return match ? match[1] : "";
}

// LOT = ce qui vient après AI 10
function extractLOT(udi){
    const value = cleanOnlyAlphaNum(udi);
    const index = value.indexOf("10", 16);

    if(index !== -1){
        return value.substring(index + 2);
    }

    return "";
}

// Détection automatique du séparateur CSV
function splitCSVLine(line){
    let separator = ",";

    if(line.includes(";")) separator = ";";
    else if(line.includes("\t")) separator = "\t";

    return line.split(separator).map(v =>
        v.trim().replace(/^"|"$/g, "")
    );
}

// Chargement du fichier data.csv
fetch("data.csv")
.then(response => {
    if(!response.ok){
        throw new Error("data.csv introuvable");
    }
    return response.text();
})
.then(text => {
    const lines = text.trim().split(/\r?\n/);

    database = lines.slice(1).map(line => {
        const cols = splitCSVLine(line);

        return {
            ref: clean(cols[0]),
            lot: cleanOnlyAlphaNum(cols[1]),
            udi: cleanOnlyAlphaNum(cols[2]),
            gtin: extractGTIN(cols[2])
        };
    });

    document.getElementById("status").innerHTML =
        "✅ Base chargée : " + database.length + " lignes";

    console.log("BASE CSV =", database);
})
.catch(error => {
    document.getElementById("status").innerHTML =
        "❌ Erreur : impossible de charger data.csv";
    console.error(error);
});

function onScanSuccess(decodedText){
    const scannedUDI = cleanOnlyAlphaNum(decodedText);
    const scannedGTIN = extractGTIN(scannedUDI);
    const scannedLOT = extractLOT(scannedUDI);

    document.getElementById("udi").innerHTML =
        "<strong>UDI scanné :</strong> " + scannedUDI;

    document.getElementById("gtin").innerHTML =
        "<strong>GTIN :</strong> " + (scannedGTIN || "Non trouvé");

    document.getElementById("lot").innerHTML =
        "<strong>LOT :</strong> " + (scannedLOT || "Non trouvé");

    const product = database.find(p =>
        p.udi === scannedUDI ||
        p.lot === scannedLOT ||
        p.gtin === scannedGTIN
    );

    if(product){
        document.getElementById("ref").innerHTML =
            "<strong>Référence :</strong> " + product.ref;

        document.getElementById("lot").innerHTML =
            "<strong>LOT :</strong> " + product.lot;

        document.getElementById("gtin").innerHTML =
            "<strong>GTIN :</strong> " + product.gtin;

        document.getElementById("udi").innerHTML =
            "<strong>UDI :</strong> " + product.udi;

        addHistory(product.ref + " | LOT " + product.lot + " | GTIN " + product.gtin);
    }
    else{
        document.getElementById("ref").innerHTML =
            "❌ Référence non trouvée dans data.csv";

        addHistory("Inconnu | " + scannedUDI);
    }
}

function onScanFailure(error){
    // Ne rien afficher, sinon ça spamme
}

function addHistory(text){
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = text;
    document.getElementById("history").prepend(div);
}

const scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
});

scanner.render(onScanSuccess, onScanFailure);
</script>

</body>
</html>
