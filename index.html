<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scanner UDI SoftFil</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:Arial,sans-serif;text-align:center;background:#f4f6f9;margin:20px}
.logo{max-width:350px;width:80%;margin:10px auto 20px;display:block}
.logo-fallback{font-size:42px;font-weight:bold;color:#f26b21;margin:15px}
#reader{width:420px;max-width:95vw;margin:auto}
.card{background:white;max-width:750px;margin:20px auto;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
button,select{padding:12px;margin:8px;border:none;border-radius:8px;background:#2c3e50;color:white;font-size:16px}
select{max-width:95%;background:#34495e}
.line{margin:10px;font-size:18px}
.count{font-size:24px;font-weight:bold;color:#27ae60}
.item{background:#ecf0f1;margin:5px;padding:10px;border-radius:8px}
</style>
</head>

<body>

<img src="softfil-orange.webp" class="logo" alt="SoftFil Logo"
onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block';">
<div id="logoFallback" class="logo-fallback" style="display:none;">SoftFil</div>

<h2>📷 Scanner UDI SoftFil</h2>

<select id="cameraSelect" onchange="changeCamera()"></select>
<br>

<button onclick="toggleFlash()">💡 Flash ON/OFF</button>
<button onclick="validateScan()">✅ Valider</button>

<div id="reader"></div>

<div class="card">
    <div id="status">Chargement de la base...</div>
    <div class="line" id="ref"></div>
    <div class="line" id="gtin"></div>
    <div class="line" id="lot"></div>
    <div class="line" id="mfg"></div>
    <div class="line" id="exp"></div>
    <div class="line" id="udi"></div>
    <div class="count" id="count"></div>
</div>

<div class="card">
    <h3>📊 Comptage</h3>
    <div id="history"></div>
</div>

<script>
let database = [];
let lastProduct = null;
let counters = {};
let html5QrCode;
let currentCameraId = null;
let flashOn = false;

function cleanAlpha(value){
    return String(value || "")
        .replace(/\u001d/g,"")
        .replace(/[^A-Za-z0-9]/g,"")
        .toUpperCase()
        .trim();
}

function cleanRef(value){
    return String(value || "")
        .replace(/\u001d/g,"")
        .replace(/[^A-Za-z0-9\/]/g,"")
        .toUpperCase()
        .trim();
}

function formatDateYYMMDD(value){
    if(!value || value.length !== 6) return "";
    return value.substring(4,6) + "/" + value.substring(2,4) + "/20" + value.substring(0,2);
}

function parseUDI(udi){
    const value = cleanAlpha(udi);
    const match = value.match(/01(\d{14})11(\d{6})17(\d{6})10(.+)$/);

    if(match){
        return {
            gtin: match[1],
            mfg: formatDateYYMMDD(match[2]),
            exp: formatDateYYMMDD(match[3]),
            lot: match[4],
            udi: value
        };
    }

    return { gtin:"", mfg:"", exp:"", lot:"", udi:value };
}

function splitCSV(line){
    let sep = ",";
    if(line.includes(";")) sep = ";";
    if(line.includes("\t")) sep = "\t";
    return line.split(sep).map(x => x.trim().replace(/^"|"$/g,""));
}

fetch("data.csv")
.then(r => r.text())
.then(text => {
    const lines = text.trim().split(/\r?\n/);
    database = lines.slice(1).map(line => {
        const cols = splitCSV(line);
        return {
            ref: cleanRef(cols[0]),
            lot: cleanAlpha(cols[1]),
            udi: cleanAlpha(cols[2])
        };
    });

    document.getElementById("status").innerHTML =
        "✅ Base chargée : " + database.length + " références";
})
.catch(error => {
    document.getElementById("status").innerHTML =
        "❌ Impossible de charger data.csv";
    console.error(error);
});

function onScanSuccess(decodedText){
    const parsed = parseUDI(decodedText);

    let product = database.find(p => p.lot === parsed.lot);

    if(!product){
        product = database.find(p => parsed.udi.includes(p.lot));
        if(product && !parsed.lot) parsed.lot = product.lot;
    }

    if(product){
        lastProduct = {
            ref: product.ref,
            lot: parsed.lot || product.lot,
            gtin: parsed.gtin,
            mfg: parsed.mfg,
            exp: parsed.exp,
            udi: parsed.udi
        };

        document.getElementById("ref").innerHTML = "<strong>Référence :</strong> " + lastProduct.ref;
        document.getElementById("gtin").innerHTML = "<strong>GTIN :</strong> " + lastProduct.gtin;
        document.getElementById("lot").innerHTML = "<strong>LOT :</strong> " + lastProduct.lot;
        document.getElementById("mfg").innerHTML = "<strong>Date de fabrication :</strong> " + lastProduct.mfg;
        document.getElementById("exp").innerHTML = "<strong>Date de péremption :</strong> " + lastProduct.exp;
        document.getElementById("udi").innerHTML = "<strong>UDI scanné :</strong><br>" + lastProduct.udi;
        document.getElementById("count").innerHTML = "Produit prêt à valider";
    } else {
        lastProduct = null;
        document.getElementById("ref").innerHTML = "❌ Référence non trouvée";
        document.getElementById("gtin").innerHTML = "<strong>GTIN :</strong> " + parsed.gtin;
        document.getElementById("lot").innerHTML = "<strong>LOT :</strong> " + parsed.lot;
        document.getElementById("mfg").innerHTML = "<strong>Date de fabrication :</strong> " + parsed.mfg;
        document.getElementById("exp").innerHTML = "<strong>Date de péremption :</strong> " + parsed.exp;
        document.getElementById("udi").innerHTML = "<strong>UDI scanné :</strong><br>" + parsed.udi;
        document.getElementById("count").innerHTML = "";
    }
}

function onScanFailure(error){}

async function startScanner(cameraId){
    if(html5QrCode && html5QrCode.isScanning){
        await html5QrCode.stop();
    }

    html5QrCode = new Html5Qrcode("reader");
    currentCameraId = cameraId;
    flashOn = false;

    const config = {
        fps: 20,
        qrbox: { width: 180, height: 180 },
        aspectRatio: 1.0,
        experimentalFeatures: {
            useBarCodeDetectorIfSupported: true
        },
        videoConstraints: {
            deviceId: { exact: cameraId },
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            focusMode: "continuous",
            exposureMode: "continuous"
        }
    };

    try{
        await html5QrCode.start(
            { deviceId: { exact: cameraId } },
            config,
            onScanSuccess,
            onScanFailure
        );
    }catch(error){
        document.getElementById("status").innerHTML =
            "❌ Erreur caméra : " + error;
        console.error(error);
    }
}

async function loadCameras(){
    try{
        const cameras = await Html5Qrcode.getCameras();
        const select = document.getElementById("cameraSelect");
        select.innerHTML = "";

        cameras.forEach((camera, index) => {
            const option = document.createElement("option");
            option.value = camera.id;
            option.text = camera.label || "Caméra " + (index + 1);
            select.appendChild(option);
        });

        let backCamera =
            cameras.find(c => c.label.toLowerCase().includes("back")) ||
            cameras.find(c => c.label.toLowerCase().includes("rear")) ||
            cameras[cameras.length - 1];

        if(backCamera){
            select.value = backCamera.id;
            await startScanner(backCamera.id);
        }
    }catch(error){
        document.getElementById("status").innerHTML =
            "❌ Aucune caméra détectée";
        console.error(error);
    }
}

async function changeCamera(){
    const cameraId = document.getElementById("cameraSelect").value;
    await startScanner(cameraId);
}

async function toggleFlash(){
    try{
        if(!html5QrCode) return;

        const capabilities = html5QrCode.getRunningTrackCapabilities();

        if(!capabilities.torch){
            alert("Le flash n'est pas disponible sur cette caméra.");
            return;
        }

        flashOn = !flashOn;

        await html5QrCode.applyVideoConstraints({
            advanced: [{ torch: flashOn }]
        });

    }catch(error){
        alert("Impossible d'activer le flash sur cette caméra.");
        console.error(error);
    }
}

function validateScan(){
    if(!lastProduct){
        alert("Aucun produit valide.");
        return;
    }

    const key = lastProduct.ref + "|" + lastProduct.lot;

    if(!counters[key]){
        counters[key] = {
            ref: lastProduct.ref,
            lot: lastProduct.lot,
            gtin: lastProduct.gtin,
            exp: lastProduct.exp,
            count: 0
        };
    }

    counters[key].count++;

    document.getElementById("count").innerHTML =
        "Quantité scannée : " + counters[key].count;

    refreshHistory();
}

function refreshHistory(){
    const history = document.getElementById("history");
    history.innerHTML = "";

    Object.values(counters).forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML =
            "<strong>" + item.ref + "</strong>" +
            " | LOT " + item.lot +
            " | GTIN " + item.gtin +
            " | EXP " + item.exp +
            " | Quantité : <strong>" + item.count + "</strong>";

        history.appendChild(div);
    });
}

loadCameras();
</script>

</body>
</html>
