<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scanner UDI - Aziz</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f4f6f9;
}
#reader {
    width: 320px;
    margin: auto;
}
.card {
    background: white;
    padding: 15px;
    margin: 20px auto;
    border-radius: 10px;
    max-width: 420px;
}
button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #2c3e50;
    color: white;
    cursor: pointer;
}
.item {
    background: #eee;
    margin: 5px;
    padding: 8px;
    border-radius: 6px;
}
</style>
</head>

<body>

<h2>📷 Scanner UDI</h2>
<p><strong>Application développée par Aziz</strong></p>

<div id="reader"></div>

<button onclick="startScan()">▶️ Scanner</button>
<button onclick="validateScan()">✅ Valider</button>

<div class="card" id="result" style="display:none;">
    <p id="udi"></p>
    <h3 id="ref"></h3>
    <p id="lot"></p>
</div>

<div class="card">
    <h3>📊 Historique</h3>
    <div id="history"></div>
</div>

<script>
let database = [];
let lastScan = null;
let scannerActive = false;

// Nettoyage UDI / LOT / REF
function normalize(value) {
    return String(value || "")
        .replace(/\r/g, "")
        .replace(/\n/g, "")
        .replace(/[^A-Za-z0-9]/g, "")
        .toUpperCase()
        .trim();
}

// Lecture CSV simple
function parseCSVLine(line) {
    return line.split(",").map(col => col.trim().replace(/^"|"$/g, ""));
}

// Chargement data.csv
fetch("data.csv")
    .then(res => {
        if (!res.ok) throw new Error("Impossible de charger data.csv");
        return res.text();
    })
    .then(text => {
        const lines = text.trim().split(/\r?\n/);

        database = lines.slice(1)
            .map(line => {
                const cols = parseCSVLine(line);

                return {
                    ref: cols[0] || "",
                    lot: cols[1] || "",
                    udi: cols[2] || ""
                };
            })
            .filter(p => p.udi);

        console.log("Base chargée :", database);
    })
    .catch(error => {
        alert("Erreur chargement data.csv : " + error.message);
    });

function startScan() {
    scannerActive = true;
    lastScan = null;

    document.getElementById("result").style.display = "block";
    document.getElementById("udi").innerText = "Scanner prêt...";
    document.getElementById("ref").innerText = "";
    document.getElementById("lot").innerText = "";
}

function onScanSuccess(code) {
    if (!scannerActive) return;

    scannerActive = false;
    lastScan = code;

    document.getElementById("result").style.display = "block";
    document.getElementById("udi").innerText = "UDI scanné : " + code;
    document.getElementById("ref").innerText = "En attente de validation...";
    document.getElementById("lot").innerText = "";
}

function validateScan() {
    if (!lastScan) {
        alert("Veuillez d'abord scanner un UDI.");
        return;
    }

    const udiScan = normalize(lastScan);

    const product = database.find(p => {
        const udiDB = normalize(p.udi);

        return udiDB === udiScan ||
               udiScan.includes(udiDB) ||
               udiDB.includes(udiScan);
    });

    if (product) {
        document.getElementById("ref").innerText = "✅ Référence : " + product.ref;
        document.getElementById("lot").innerText = "LOT : " + product.lot;

        addHistory(product.ref + " | LOT " + product.lot);
    } else {
        document.getElementById("ref").innerText = "❌ Produit non trouvé";
        document.getElementById("lot").innerText = "";

        addHistory("Inconnu | " + lastScan);
    }
}

function addHistory(text) {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = text;
    document.getElementById("history").prepend(div);
}

const scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
});

scanner.render(onScanSuccess);
</script>

</body>
</html>
